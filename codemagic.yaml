workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events: []
    integrations:
      app_store_connect: OnSite Calculator
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.onsiteclub.minutes
      vars:
        BUNDLE_ID: "com.onsiteclub.minutes"
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install --legacy-peer-deps

      - name: Set build number in app.json
        script: |
          # Use epoch timestamp to guarantee unique, always-increasing build number
          NEW_BUILD=$(date +%s)
          echo "Setting build number to: $NEW_BUILD"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json'));
            app.expo.ios = app.expo.ios || {};
            app.expo.ios.buildNumber = String($NEW_BUILD);
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('buildNumber set to:', app.expo.ios.buildNumber);
          "

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean

      - name: Find Xcode workspace
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Found workspace: $WORKSPACE, scheme: $SCHEME"

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - cris@onsiteclub.com.br
        notify:
          success: true
          failure: true
