workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events: []
    integrations:
      app_store_connect: OnSite Calculator
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.onsiteclub.minutes
      vars:
        BUNDLE_ID: "com.onsiteclub.minutes"
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install --legacy-peer-deps

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli eas-cli

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean

      - name: Find Xcode workspace
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Found workspace: $WORKSPACE, scheme: $SCHEME"

      - name: Patch Podfile to suppress warnings
        script: |
          cd ios
          # Add inhibit_all_warnings before use_native_modules
          sed -i '' '/^platform/a\
          inhibit_all_warnings!
          ' Podfile
          # Inject warning suppression into existing post_install hook
          sed -i '' '/post_install do |installer|/a\
              installer.pods_project.targets.each do |target|\
                target.build_configurations.each do |config|\
                  config.build_settings["GCC_TREAT_WARNINGS_AS_ERRORS"] = "NO"\
                  config.build_settings["SWIFT_TREAT_WARNINGS_AS_ERRORS"] = "NO"\
                end\
              end
          ' Podfile

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd ios
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "com.onsiteclub.minutes" || echo 0)
          NEW_BUILD=$((LATEST_BUILD + 1))
          echo "Latest TestFlight build: $LATEST_BUILD → New build: $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - cris@onsiteclub.com.br
        notify:
          success: true
          failure: true
