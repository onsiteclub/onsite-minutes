workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events: []
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.onsiteclub.minutes"
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli eas-cli

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/onsiteminutes.xcworkspace" \
            --scheme "onsiteminutes"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
      email:
        recipients:
          - cris@onsiteclub.com.br
        notify:
          success: true
          failure: true
