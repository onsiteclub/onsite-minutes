workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events: []
    integrations:
      app_store_connect: OnSite Calculator
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.onsiteclub.minutes"
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.onsiteclub.minutes
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install --legacy-peer-deps

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli eas-cli

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean

      - name: Find Xcode workspace
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Found workspace: $WORKSPACE, scheme: $SCHEME"

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - cris@onsiteclub.com.br
        notify:
          success: true
          failure: true
